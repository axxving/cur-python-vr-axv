<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Sitio Web{% endblock %}</title>
    <!-- Cargar archivos estáticos -->
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'myapp/css/styles.css' %}">
    <style>
      body {
        font-family: 'Lato', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
        color: #333;
      }
      header {
        background-color: #092E20;
        padding: 20px 0;
        text-align: center;
        color: white;
      }
      header h1 {
        margin: 0;
        font-size: 2.5em;
        font-weight: 700;
      }
      nav {
        margin-top: 10px;
      }
      nav ul {
        list-style-type: none;
        padding: 0;
        margin: 0;
      }
      nav ul li {
        display: inline;
        margin-right: 20px;
      }
      nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: bold;
      }
      nav ul li a:hover {
        color: #44B78B;
      }
      .content {
        padding: 40px 20px;
        max-width: 1200px;
        margin: 0 auto;
        background-color: white;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        margin-top: 20px;
      }
      h2 {
        color: #092E20;
        font-weight: 700;
      }
      footer {
        text-align: center;
        padding: 10px;
        background-color: #092E20;
        color: white;
        margin-top: 40px;
        position: fixed;
        bottom: 0;
        width: 100%;
      }
    </style>
</head>
<body>
    <header>
        <h1>Mi Sitio Web</h1>
        <nav>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/about/">Sobre Nosotros</a></li>
                <li><a href="/contact/">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <div class="content">
        {% block content %}
        <!-- Aquí irá el contenido específico de cada página -->
        {% endblock %}
    </div>

    <footer>
        <p>Mi Sitio Web &copy; 2024</p>
    </footer>
</body>
</html>
